<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moshe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      #root { width: 100vw; height: 100vh; }
      @keyframes moshe-breathe {
        0%, 100% { text-shadow: 0 0 16px rgba(255,255,255,0.28); color: #e0e0e0; }
        50%      { text-shadow: 0 0 40px rgba(255,255,255,0.65); color: #ffffff; }
      }
      @keyframes moshe-shimmer {
        from { opacity: 0.65; transform: scale(1); }
        to   { opacity: 1.00; transform: scale(1.04); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
